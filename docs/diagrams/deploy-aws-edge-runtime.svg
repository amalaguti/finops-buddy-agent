<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" width="920" height="320">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arr3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <text x="460" y="28" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Reference architecture: edge, compute, and LLM (internal users, public HTTPS)</text>

  <g filter="url(#shadow)">
    <rect x="24" y="70" width="100" height="72" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
    <text x="74" y="100" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#334155">Internal user</text>
    <text x="74" y="118" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#334155">(browser)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="154" y="70" width="100" height="72" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
    <text x="204" y="105" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#9a3412">AWS WAF</text>
    <text x="204" y="122" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#c2410c">L7 rules, logs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="284" y="70" width="120" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="344" y="98" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af">ALB</text>
    <text x="344" y="115" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#1d4ed8">HTTPS + OIDC</text>
    <text x="344" y="130" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#3b82f6">access logs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="284" y="188" width="120" height="72" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="344" y="218" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">Corporate IdP</text>
    <text x="344" y="236" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#6d28d9">Entra / Okta / Google</text>
