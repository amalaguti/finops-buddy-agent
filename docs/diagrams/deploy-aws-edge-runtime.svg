    <text x="515" y="124" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857">ECS Fargate</text>
    <text x="515" y="142" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#065f46">FinOps Buddy</text>
    <text x="515" y="158" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#0d9488">FastAPI + SSE chat</text>
    <text x="515" y="174" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#0d9488">task IAM role</text>
  </g>

  <g filter="url(#shadow)">
