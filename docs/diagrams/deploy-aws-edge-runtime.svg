    <text x="795" y="130" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#b45309">Amazon Bedrock</text>
    <text x="795" y="150" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#d97706">IAM from task role</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="210" width="100" height="44" rx="6" fill="#fff" stroke="#64748b" stroke-width="1"/>
    <text x="650" y="237" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#334155">S3 (logs)</text>
  </g>

  <path d="M 124 106 L 154 106" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 254 106 L 284 106" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 404 106 L 450 106" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 580 140 L 740 140" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 500 210 L 500 184" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr2)"/>
  <path d="M 344 142 L 344 188" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr3)"/>
  <path d="M 344 130 L 650 210" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr2)"/>

  <text x="460" y="302" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b">Solid: request path | Dashed purple: OIDC | Gray dashed: ALB logs to S3 | ECR pull</text>
