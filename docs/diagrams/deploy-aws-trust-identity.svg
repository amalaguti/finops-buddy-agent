<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="m1" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <text x="400" y="28" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Trust layers: people, app, and AWS accounts</text>

  <text x="400" y="52" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#64748b">OpenSpec change: deploy-aws (proposal + design)</text>

  <!-- Layer labels -->
  <text x="30" y="95" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Layer 1</text>
  <text x="30" y="195" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Layer 2</text>
  <text x="30" y="295" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Layer 3</text>

  <!-- Layer 1 boxes -->
  <g filter="url(#sh)">
    <rect x="100" y="72" width="200" height="56" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="200" y="98" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">Corporate IdP</text>
    <text x="200" y="115" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#6d28d9">OIDC | app assignment | optional groups claim</text>
  </g>
  <g filter="url(#sh)">
    <rect x="330" y="72" width="200" height="56" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="430" y="98" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">ALB Authenticate</text>
    <text x="430" y="115" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#1d4ed8">TLS termination | inject identity headers</text>
  </g>
  <g filter="url(#sh)">
    <rect x="560" y="72" width="200" height="56" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="660" y="95" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#047857">FastAPI (trusted proxy mode)</text>
    <text x="660" y="112" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#065f46">Reject missing identity | optional FINOPS_ALLOWED_IDP_GROUPS</text>
  </g>

  <!-- Layer 2 -->
  <g filter="url(#sh)">
    <rect x="100" y="172" width="280" height="56" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
    <text x="240" y="198" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#334155">ECS task IAM role (hub)</text>
    <text x="240" y="215" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b">Base credentials | Bedrock | STS AssumeRole</text>
  </g>
  <g filter="url(#sh)">
    <rect x="420" y="172" width="340" height="56" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
    <text x="590" y="198" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#9a3412">FINOPS_ASSUMABLE_TARGETS_JSON / YAML map</text>
    <text x="590" y="215" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#c2410c">Logical target id to role ARN for member accounts</text>
  </g>

  <!-- Layer 3 -->
  <g filter="url(#sh)">
    <rect x="100" y="272" width="160" height="56" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="180" y="298" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#334155">Member account A</text>
    <text x="180" y="315" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b">FinOps reader role (trust hub)</text>
  </g>
  <g filter="url(#sh)">
    <rect x="290" y="272" width="160" height="56" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="370" y="298" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#334155">Member account B</text>
    <text x="370" y="315" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b">FinOps reader role (trust hub)</text>
  </g>
  <g filter="url(#sh)">
    <rect x="480" y="272" width="160" height="56" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="560" y="298" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#334155">Member account N</text>
    <text x="560" y="315" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b">Same pattern</text>
  </g>

  <path d="M 300 100 L 330 100" stroke="#334155" stroke-width="2" marker-end="url(#m1)"/>
  <path d="M 530 100 L 560 100" stroke="#334155" stroke-width="2" marker-end="url(#m1)"/>
  <path d="M 660 128 L 660 172" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#m1)"/>
  <path d="M 380 228 L 180 272" stroke="#334155" stroke-width="1.5" marker-end="url(#m1)"/>
  <path d="M 420 228 L 370 272" stroke="#334155" stroke-width="1.5" marker-end="url(#m1)"/>
  <path d="M 600 228 L 560 272" stroke="#334155" stroke-width="1.5" marker-end="url(#m1)"/>

  <text x="400" y="350" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#64748b">Layer 1: only selected employees (IdP + optional app group check) | Layer 3: least-privilege Cost Explorer / FinOps reads per account</text>
</svg>
